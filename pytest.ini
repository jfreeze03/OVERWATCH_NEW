# The tests import the first-party ``app`` package from the repo root, which
# is never pip-installed. ``python -m pytest`` adds the CWD to sys.path and
# masked that locally; the bare ``pytest`` entrypoint (CI, make test) does NOT,
# so collection died with ModuleNotFoundError: No module named 'app'.
# ``pythonpath`` (pytest >= 7) puts the repo root on sys.path either way.
[pytest]
pythonpath = .
testpaths = tests
