line-length = 110
target-version = "py311"

[lint]
# BLE001 (blind except) is the enforcement of panel-review finding H2:
# the old app accumulated 461 silent `except Exception` sites.
# C4/SIM/PIE/PERF/RUF added 2026-07: comprehension, simplification, and
# perf-antipattern rules; the codebase was brought to zero findings first.
select = ["E", "F", "W", "I", "B", "BLE", "UP", "C4", "SIM", "PIE", "PERF", "RUF"]
ignore = [
  "E501",   # long lines allowed in SQL builder strings; line-length still guides
  "RUF001", # typographic unicode (em dashes etc.) in strings is house style
  "RUF002", # same, in docstrings
  "RUF003", # same, in comments
  "SIM105", # explicit try/except-pass reads clearer than contextlib.suppress here
  "SIM108", # ternaries are not always clearer than if/else blocks
]

[lint.per-file-ignores]
# The error boundary and session bootstrap are the two sanctioned places that
# may catch broad exceptions (they record them; they do not swallow them).
"app/core/errors.py" = ["BLE001"]
"app/core/session.py" = ["BLE001"]
"app/core/query.py" = ["BLE001"]
"app/core/state.py" = ["BLE001"]
"app/core/ai.py" = ["BLE001"]
