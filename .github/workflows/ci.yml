name: ci

on:
  push:
    branches: [main]
  pull_request:

# A newer push to the same branch/PR supersedes the running build.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-dev.txt
      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt
      - name: Ruff (style + blind-except ban)
        run: ruff check .
      - name: Pytest (logic + data layers + page smokes)
        run: pytest -q
