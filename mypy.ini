# Type checking for the PURE layers only (app/logic, app/data are
# Streamlit-free by design; config/companies are plain constants+functions).
# The UI layer is exercised by the AppTest smoke suite instead — Streamlit's
# dynamic API makes mypy noise exceed signal there.
[mypy]
python_version = 3.11
files = app/logic, app/data, app/config.py, app/companies.py
ignore_missing_imports = True
warn_unused_ignores = True
warn_redundant_casts = True
no_implicit_optional = True
check_untyped_defs = True

# numpy 2.x ships PEP 695 `type` statements in its bundled stubs, which mypy
# refuses to parse below python_version 3.12. We deliberately type-check against
# the 3.11 deployment floor, so treat numpy as Any — the same footing pandas
# already has (no bundled stubs + ignore_missing_imports).
[mypy-numpy,numpy.*]
follow_imports = skip
follow_imports_for_stubs = True
