# Snowflake CLI project definition for Streamlit-in-Snowflake deploys.
# Usage: snow streamlit deploy --replace
definition_version: 2
entities:
  overwatch:
    type: streamlit
    identifier:
      name: OVERWATCH_APP
      database: DBA_MAINT_DB
      schema: OVERWATCH
    stage: DBA_MAINT_DB.OVERWATCH.OVERWATCH_STAGE
    main_file: streamlit_app.py
    query_warehouse: WH_ALFA_OVERWATCH
    title: "OVERWATCH — Snowflake Command Center"
    artifacts:
      - streamlit_app.py
      - environment.yml
      - app/
      - snowflake/native_alert_templates.sql
